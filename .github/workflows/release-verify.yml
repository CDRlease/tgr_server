name: tgr-dist-release-verify

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to validate, for example v0.1.0
        required: true
        type: string

jobs:
  verify-and-dispatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve release metadata
        id: meta
        env:
          MANUAL_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag_name="$MANUAL_TAG"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag_name}"
          component="${GITHUB_REPOSITORY#*/tgr_}"
          echo "tag=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_url=$release_url" >> "$GITHUB_OUTPUT"
          echo "component=$component" >> "$GITHUB_OUTPUT"

      - name: Validate mirrored release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          EXPECTED_COMPONENT: ${{ steps.meta.outputs.component }}
        run: |
          set -euo pipefail
          mkdir -p downloaded extracted

          gh release download "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "manifest.json" \
            --pattern "SHA256SUMS.txt" \
            --dir downloaded \
            --clobber

          manifest_component="$(jq -r '.component' downloaded/manifest.json)"
          manifest_mode="$(jq -r '.mode' downloaded/manifest.json)"
          manifest_source_repo="$(jq -r '.sourceRepo' downloaded/manifest.json)"
          bundle_count="$(jq '.bundles | length' downloaded/manifest.json)"

          case "$EXPECTED_COMPONENT" in
            server)
              expected_source_repo="JiepengTan/tg_server"
              expected_bundle_count=6
              ;;
            engine)
              expected_source_repo="JiepengTan/tg_engine"
              expected_bundle_count=1
              ;;
            config)
              expected_source_repo="JiepengTan/tg_config"
              expected_bundle_count=1
              ;;
            codegen)
              expected_source_repo="JiepengTan/tg_codegen"
              expected_bundle_count=6
              ;;
            *)
              echo "Unsupported component: $EXPECTED_COMPONENT" >&2
              exit 1
              ;;
          esac

          test "$manifest_mode" = "release"
          test "$manifest_component" = "$EXPECTED_COMPONENT"
          test "$manifest_source_repo" = "$expected_source_repo"
          test "$bundle_count" -eq "$expected_bundle_count"
          test "$(jq '[.bundles[].name] | unique | length' downloaded/manifest.json)" -eq "$bundle_count"

          mapfile -t bundle_names < <(jq -r '.bundles[].name' downloaded/manifest.json)
          for bundle_name in "${bundle_names[@]}"; do
            gh release download "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${bundle_name}" \
              --dir downloaded \
              --clobber
          done

          if command -v sha256sum >/dev/null 2>&1; then
            checksum_cmd=(sha256sum -c SHA256SUMS.txt)
          else
            checksum_cmd=(shasum -a 256 -c SHA256SUMS.txt)
          fi

          (
            cd downloaded
            "${checksum_cmd[@]}"
          )

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" > downloaded/release.json
          while IFS= read -r bundle_row; do
            bundle_name="$(jq -r '.name' <<<"$bundle_row")"
            bundle_os="$(jq -r '.os' <<<"$bundle_row")"
            bundle_arch="$(jq -r '.arch' <<<"$bundle_row")"
            validation_type="$(jq -r '.validation.type' <<<"$bundle_row")"
            extract_dir="extracted/${bundle_os}-${bundle_arch}"

            case "$bundle_os" in
              any)
                test "$bundle_arch" = "any"
                expected_bundle_name="${EXPECTED_COMPONENT}-any-any.zip"
                ;;
              linux|osx|win)
                case "$bundle_arch" in
                  amd64|arm64) ;;
                  *)
                    echo "Unsupported bundle arch: $bundle_arch" >&2
                    exit 1
                    ;;
                esac
                expected_bundle_name="${EXPECTED_COMPONENT}-${bundle_os}-${bundle_arch}.zip"
                ;;
              *)
                echo "Unsupported bundle os: $bundle_os" >&2
                exit 1
                ;;
            esac

            test "$bundle_name" = "$expected_bundle_name"
            test "$validation_type" = "bundle-entry-exists"
            unzip -oq "downloaded/${bundle_name}" -d "$extract_dir"

            while IFS= read -r validation_path; do
              test -f "${extract_dir}/${validation_path}"
            done < <(jq -r '.validation.paths[]' <<<"$bundle_row")

            browser_url="$(jq -r --arg zipName "$bundle_name" '.assets[] | select(.name == $zipName) | .browser_download_url' downloaded/release.json)"
            test -n "$browser_url"
            curl -fsSL -o "/tmp/${bundle_name}" "${browser_url}"
          done < <(jq -c '.bundles[]' downloaded/manifest.json)

      - name: Dispatch acceptance to tg_client
        env:
          GH_TOKEN: ${{ secrets.CLIENT_DISPATCH_TOKEN }}
          COMPONENT: ${{ steps.meta.outputs.component }}
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          RELEASE_URL: ${{ steps.meta.outputs.release_url }}
        run: |
          set -euo pipefail
          payload="$(jq -cn \
            --arg component "$COMPONENT" \
            --arg repo "$GITHUB_REPOSITORY" \
            --arg tag "$TAG_NAME" \
            --arg release_url "$RELEASE_URL" \
            '{event_type:"verify-dist-release", client_payload:{component:$component, repo:$repo, tag:$tag, release_url:$release_url}}')"

          gh api "repos/JiepengTan/tg_client/dispatches" \
            --method POST \
            --input - <<<"${payload}"
